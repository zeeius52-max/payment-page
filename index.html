<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repayment Portal</title>

<style>
body{
margin:0;
padding:20px;
background:#f3f3f3;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:auto;
}

.header{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.blue-card{
background:#4f67ff;
color:white;
border-radius:15px;
padding:20px;
text-align:center;
}

.days{
font-size:55px;
font-weight:bold;
color:#ffb400;
}

.row{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.white-card{
background:white;
border-radius:12px;
padding:15px;
margin-top:15px;
}

.info{
padding:12px 0;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
}

.btn{
display:block;
width:100%;
padding:18px;
border:none;
border-radius:40px;
margin-top:15px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.blue{
background:#4f67ff;
color:white;
}

.green{
background:#55c431;
color:white;
}

.notice{
background:white;
margin-top:20px;
padding:15px;
border-radius:12px;
}

.notice h3{
color:red;
}

.footer{
text-align:center;
margin-top:20px;
color:#666;
}
</style>
</head>

<body>

<div class="container">

<div class="header" id="app">
CreditPulse
</div>

<div class="blue-card">

<div class="days" id="days">0</div>
<div>Remain Days</div>

<div class="row">
<div>
<h2>₹<span id="amount">0</span></h2>
<div>Repayment Amount</div>
</div>

<div>
<h2 id="date">2026-06-13</h2>
<div>Repayment Date</div>
</div>
</div>

</div>

<div class="white-card">

<div class="info">
<span>Period</span>
<span id="period">7 days</span>
</div>

<div class="info">
<span>Loan Status</span>
<span id="status">Pending Payment</span>
</div>

<div class="info">
<span>Name</span>
<span id="name">Customer</span>
</div>

<div class="info" style="border:none;">
<span>Mobile</span>
<span id="mobile">0000000000</span>
</div>

</div>

<button class="btn blue" onclick="goRepay()">
Go To Repay<div class="white-card">

<h3>UPI Payment</h3>

<p><b>UPI ID:</b> <span id="upiText"></span></p>

<button class="btn blue" onclick="copyUPI()">
Copy UPI ID
</button>

<br><br>

<img id="qr" width="220">

</div>
</button>

<button class="btn blue">
Apply For Deferment
</button>

<button class="btn green">
Upload Payment Voucher
</button>

<div class="notice">
<h3>Customer Notice:</h3>
<p>
Please repay on time. For support contact customer care.
</p>
</div>

<div class="footer">
Barfiiii Version 4 🚀
</div>

</div>

<script>

const p=new URLSearchParams(window.location.search);

document.getElementById("app").innerText=
p.get("app")||"CreditPulse";

document.getElementById("amount").innerText=
p.get("amount")||"1020";

document.getElementById("date").innerText=
p.get("date")||"2026-06-13";

document.getElementById("days").innerText=
p.get("days")||"0";

document.getElementById("name").innerText=
p.get("name")||"Customer";

document.getElementById("mobile").innerText=
p.get("mobile")||"0000000000";

document.getElementById("status").innerText=
p.get("status")||"Pending Payment";

document.getElementById("period").innerText=
p.get("period")||"7 Days";

const upi=document.getElementById("upiText").innerText = upi;

const upiLink =
`upi://pay?pa=${upi}&pn=Repayment&am=${amount}&cu=INR`;

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
encodeURIComponent(upiLink);

function copyUPI(){
navigator.clipboard.writeText(upi);
alert("UPI Copied");
}
p.get("upi")||"test@upi";

function goRepay(){

const amount=
p.get("amount")||"0";

window.location.href=
`upi://pay?pa=${upi}&pn=Repayment&am=${amount}&cu=INR`;

}

</script>

</body>
</html>
