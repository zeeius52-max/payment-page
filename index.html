<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Repayment Portal</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f3f3f3;
    font-family:Arial,sans-serif;
}

.container{
    max-width:500px;
    margin:auto;
}

.header{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.blue-card{
    background:#4f67ff;
    color:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.days{
    font-size:60px;
    color:#ffbf00;
    font-weight:bold;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

.info{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
}

.info-row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #ddd;
}

.info-row:last-child{
    border-bottom:none;
}

.btn{
    width:100%;
    background:#4f67ff;
    color:white;
    border:none;
    border-radius:40px;
    padding:16px;
    font-size:24px;
    font-weight:bold;
    margin-top:20px;
    cursor:pointer;
}

.qr-box{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
    text-align:center;
}

.qr-box img{
    width:220px;
    max-width:100%;
}

.notice{
    margin-top:25px;
    color:red;
    line-height:1.7;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="header" id="appName">MastMoney</div>

<div class="blue-card">
    <div class="days">0</div>
    <div>Remain Days</div>

    <div class="row">
        <div>
            <h1 id="amount">₹3500</h1>
            <div>Repayment Amount</div>
        </div>

        <div>
            <h1>2026-06-13</h1>
            <div>Repayment Date</div>
        </div>
    </div>
</div>

<div class="info">

<div class="info-row">
<span>Period</span>
<span>7 Days</span>
</div>

<div class="info-row">
<span>Loan Status</span>
<span>Pending Payment</span>
</div>

<div class="info-row">
<span>Name</span>
<span id="customerName">Ali Khan</span>
</div>

<div class="info-row">
<span>UPI ID</span>
<span id="upiId">abc@okhdfcbank</span>
</div>

</div>

<button class="btn" onclick="openUPI()">
Go To Repay
</button>

<div class="qr-box">
    <img id="qr"
    src=""
    alt="QR Code">
</div>

<button class="btn" onclick="copyUPI()">
Copy UPI ID
</button>

<div class="notice">
<b>Customer Notice:</b><br><br>
Please complete your repayment on time.
After payment keep screenshot for record.
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const app =
params.get("app") || "MastMoney";

const name =
params.get("name") || "Ali Khan";

const amount =
params.get("amount") || "3500";

const upi =
params.get("upi") || "abc@okhdfcbank";

document.getElementById("appName").innerText = app;
document.getElementById("customerName").innerText = name;
document.getElementById("amount").innerText = "₹" + amount;
document.getElementById("upiId").innerText = upi;

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa="
+ upi +
"&pn=" + name +
"&am=" + amount;

function copyUPI(){
navigator.clipboard.writeText(upi);
alert("UPI ID Copied");
}

function openUPI(){
window.location.href =
"upi://pay?pa=" + upi +
"&pn=" + name +
"&am=" + amount;
}

</script>

</body>
</html>
